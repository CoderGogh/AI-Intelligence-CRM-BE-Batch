name: Deploy Batch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/crm-batch:latest -f Dockerfile.batch .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/crm-batch:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/crm-batch:latest
            docker rm -f batch || true
            docker run -d \
              --name batch \
              -p 8081:8081 \
              --env-file /home/ec2-user/.env \
              -e SPRING_PROFILES_ACTIVE=prod \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/crm-batch:latest