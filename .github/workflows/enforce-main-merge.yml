name: Enforce Main Merge Policy

on:
  pull_request:
    branches:
      - main

jobs:
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" != "develop" && "$BRANCH" != hotfix/* ]]; then
            echo "❌ Only develop or hotfix/* branches can merge into main"
            exit 1
          fi

          echo "✅ Source branch allowed"
          
  spring-test:
    runs-on: ubuntu-latest
    needs: validate-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run Spring tests
        run: ./gradlew test